 #   container_name: app_frontend
 #   restart: always
 #   ports:
 #     - "80:80"
 #   depends_on:
 #     - backend
 #   networks:
 #     - app_network

volumes:
  postgres_data:
  backend_node_modules:

networks:
  app_network:
    driver: bridge